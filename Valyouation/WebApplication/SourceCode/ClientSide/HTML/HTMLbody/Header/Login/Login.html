<!-- This is the html file for ValYouation home page -->

<!DOCTYPE html>

<html>

    <head>

        <!-- This will be displayed in the upprt tab -->
        <title>ValYouation</title>

        <!-- This is needed to state the type of the file -->
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

  </head>


  <body>

    <!-- This is used to create a CSS grid. The CSS grid helps setting the layout of the content and deal with different sizes of screens -->
    <div class="Grid">

        <!-- An entry for E-mail -->
        <input type="text" name="Email" placeholder="E-mail">

        <!-- An entry for password -->
        <input type="password" name="Password" placeholder="Password">

        <!-- A button to submit the form after finished to fill it -->
        <button type="button" id="SubmitButton" value="Submit">

        <!-- An entry for password -->
        <a href="">Reset Password</a>

    </div>

    <!-- Add all the required javascript files, the files are added in the end of the body part to prevent blocking, and to allow all the DOM object to be built -->
    <script src="http://localhost/SourceCode/Scripts/JavaScript/Validate/GeneralValidateFunctions/ValidateEmail.js"></script>
    <script src="http://localhost/SourceCode/Scripts/JavaScript/Validate/ValidateForms/ValidateLoginForm.js"></script>

  </body>

</html>
